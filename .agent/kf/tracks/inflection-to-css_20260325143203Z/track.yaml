id: inflection-to-css_20260325143203Z
title: "Inflection Point to CSS Animation Data Pipeline"
type: feature
status: pending
created: 2026-03-25
updated: 2026-03-25
spec:
  summary: |
    Map SimOutput inflection timelines to per-entity CSS custom properties
    and keyframe data. Produces the final animated SVG from simulation
    output. Full-frame pixel-diff validation against canvas renderer.
  context: |
    This is the final integration track. SimOutput provides:
    - events[] — all state change events with frame numbers
    - entityTimelines — per-entity inflection points (spawn, move, fire, hit, destroy, etc.)
    - totalFrames — total animation length
    - config — all physics parameters including framesPerSecond

    The pipeline:
    1. Query SimOutput.getAllInflections() for all entity timelines
    2. For each entity, compute CSS custom properties:
       - --spawn-time, --destroy-time (visibility window)
       - --start-x, --start-y, --end-x, --end-y (position keyframes)
       - --duration (animation segment duration)
       - --delay (animation start offset)
    3. Map frame numbers to CSS time: frame / framesPerSecond = seconds
    4. Compose all entities into a single SVG with embedded CSS
    5. Validate full SVG against canvas renderer via Playwright pixel-diff

    The composed SVG must be GitHub-safe (no JavaScript, no external resources).
  acceptance_criteria:
    - Inflection timeline to CSS property mapper for all entity types
    - Frame-to-time conversion using framesPerSecond
    - Formation oscillation keyframes generated from direction_change inflections
    - Cell lifecycle keyframes generated from pluck/travel/hatch inflections
    - Laser keyframes generated from fire inflection + constant velocity
    - Ship keyframes generated from move_start/move_end inflections
    - Overlay opacity keyframes generated from wave phase changes
    - Ending sequence keyframes (score display, scoreboard, blackout, reset)
    - Full SVG compositor assembling all entities with CSS animations
    - Playwright full-frame pixel-diff: canvas vs SVG at inflection frames
    - Pixel diff under 1% at every test frame
    - SVG output is GitHub-safe (no JS, no external resources)
    - SVG file size reasonable (under 200KB for full-year animation)
  out_of_scope: |
    Visual polish (sprites, effects, palettes). GitHub Action packaging.
  technical_notes: |
    Directory: src/animation/
      timeline-mapper.ts   — inflection frames to CSS time percentages
      entity-binder.ts     — per-entity CSS custom property computation
      svg-compositor.ts    — assembles full SVG with embedded CSS

    Key mapping: frame → time
      time_seconds = frame / config.framesPerSecond
      percentage = frame / totalFrames * 100

    Formation keyframes example:
      From inflection points: spawn@f0, direction_change@f100, direction_change@f200...
      @keyframes formation-0 {
        0% { transform: translate(0, 0); }
        6.67% { transform: translate(80px, 0); }
        13.33% { transform: translate(0, 13px); }
        ...
      }

    Validation: dev/css-validator/
      Side-by-side full canvas vs full SVG
      Playwright scrubs through inflection frames and pixel-diffs
