title: "Simulation Renderer — Visual validation tool"
type: feature
status: pending
created: 2026-03-25
updated: 2026-03-25
spec:
  summary: |
    Build a canvas-based browser renderer that peeks the SimOutput at any
    frame. Dev tool for human visual acceptance. The renderer does NOT run
    the simulation — it reads pre-computed state via SimOutput.peek(frame).
    Exposes seekToFrame() API for Playwright in the CSS generation track.
  context: |
    simulate(grid, seed, config) produces a SimOutput with:
      - peek(frame) → GameState (reconstructed from events + LRU cache)
      - getInflections(entityId) → InflectionPoint[]
      - getAllInflections() → Map<string, EntityTimeline>
      - totalFrames, finalScore, events[]

    This renderer calls SimOutput.peek(frame) and draws the GameState on
    a canvas. Because state is pre-computed:
    - Seeking to any frame is instant (LRU cache + anchor snapshots)
    - Playing forward and backward is trivial
    - Every frame renders identically every time (deterministic)

    Two purposes:
    1. HUMAN VALIDATION: developer watches, tunes SimConfig physics params,
       accepts the game visually. One-time per major change.
    2. PLAYWRIGHT API: exposes window.simController.seekToFrame(n) so
       automated tests (CSS generation track) can capture screenshots.

    Dev tool only — rough visuals. Simple shapes, not final sprites.
  codebase_analysis: |
    Current API (src/simulator/simulate.ts):
      simulate(grid: Grid, seed: string, config: SimConfig) → SimOutput

    SimOutput.peek(frame) returns GameState with:
      - frame, score, totalInvaders
      - formations[] (each with invaders[], offset, direction, speed)
      - ship (position, targetX)
      - lasers[] (position, speed, active)
      - effects[]
      - gridCells[] (cell, status, detachProgress)

    SimConfig physics params (all tunable via UI):
      laserSpeed, laserWidth, invaderSize, shipSpeed, shipY,
      formationBaseSpeed, formationMaxSpeed, formationRowDrop,
      hitChance, cellSize, cellGap, playArea, gridArea, waveConfig

    No separate engine or choreographer — simulate() is the single entry point.
    No ShipScript as public input — ship actions are solved internally.
  acceptance_criteria:
    - Canvas renderer calls SimOutput.peek(frame) — does NOT run simulation itself
    - seekToFrame(n) renders any frame instantly
    - Forward AND backward seeking works (just peek different frame numbers)
    - Same frame always renders identical canvas (deterministic peek + deterministic draw)
    - Grid cells drawn as colored rects matching GitHub contribution levels
    - Formations visible with zigzag movement
    - Damaged invaders show reduced opacity per remaining HP
    - Ship visible at config.shipY
    - Lasers visible traveling upward
    - Explosions visible on destroy events
    - Wave transitions visible (clear → next wave spawns)
    - Playback controls: play, pause, step +1/-1/+10/-10, speed slider, restart
    - Frame scrubber (range slider) for direct frame access
    - HUD: frame number, total frames, wave number, invaders remaining, score
    - SimConfig physics tuning panel (sliders for laserSpeed, shipSpeed, formationBaseSpeed, hitChance, etc.) — re-runs simulate() on change
    - Seed input field — re-runs simulate() on change
    - Fixture selector or JSON paste for different Grid inputs
    - window.simController API exposed for Playwright
    - Runs via vite dev server (imports src/ directly)
  out_of_scope: |
    Final sprites. CSS/SVG generation. GitHub Action.
    Automated Playwright tests (CSS track provides those).
  technical_notes: |
    Directory structure:
      dev/
        sim-viewer/
          index.html        — page with canvas + controls
          renderer.ts       — draws GameState to canvas
          playback.ts       — frame stepping, play/pause, speed
          main.ts           — calls simulate(), wires controls, exposes API

    Key principle: the renderer is stateless. It receives a GameState
    from peek() and draws it. No internal game state, no event processing,
    no simulation logic. Just: GameState → canvas pixels.

    Entry point:
      const output = simulate(grid, seed, config)
      // output.peek(frame) → GameState → render to canvas

    window.simController API:
      seekToFrame(n)        — output.peek(n) then render
      play() / pause()      — toggle requestAnimationFrame loop
      step(delta)           — seek to currentFrame + delta
      setSpeed(mult)        — playback speed multiplier
      restart()             — seekToFrame(0)
      getFrame()            — current frame number
      getTotalFrames()      — output.totalFrames
      getState()            — current GameState (for Playwright assertions)
      rerun(config, seed)   — re-run simulate() with new params

    Canvas drawing (simple shapes):
      Grid: rounded rects, green shades (0=empty, 1-4=intensity)
      Invaders: colored squares, opacity = currentHP / maxHP
      Ship: triangle at config.shipY
      Lasers: thin bright lines (width from config.laserWidth)
      Explosions: expanding circle with fade
      Wave labels: "WAVE N" text during spawn transitions

    Physics tuning panel:
      Sliders for all SimConfig numeric fields. Changing any value
      re-runs simulate() with the new config and resets playback to
      frame 0. This lets developers quickly iterate on game feel
      (e.g., faster lasers, slower formations, higher hit chance).

    Backward play: just decrement frame counter and peek.
    No special logic needed — SimOutput.peek() handles any frame.
