title: "Simulation Renderer — Visual validation tool"
type: feature
status: pending
created: 2026-03-25
updated: 2026-03-25
spec:
  summary: |
    Build a canvas-based browser renderer that peeks the simulation's
    StateHistory at any frame. Dev tool for human visual acceptance. The
    renderer does NOT run the simulation — it just reads pre-computed state
    via peek(frame). Exposes seekToFrame() API for Playwright in Track 3.
  context: |
    The simulation (Track 1) pre-computes a complete StateHistory. This
    renderer simply calls stateHistory.peek(frame) and draws the result
    on a canvas. Because state is pre-computed:
    - Seeking to any frame is instant (no re-simulation)
    - Playing forward and backward is trivial
    - Every frame renders identically every time (deterministic)

    Two purposes:
    1. HUMAN VALIDATION: developer watches, tunes choreographer params,
       accepts the game visually. One-time per major change.
    2. PLAYWRIGHT API: exposes window.simController.seekToFrame(n) so
       automated tests (Track 3) can capture screenshots at any frame.

    Dev tool only — rough visuals. Simple shapes, not final sprites.
  codebase_analysis: |
    Builds on Track 1 StateHistory.peek(frame) API. The renderer is a thin
    visualization layer — all game logic is in the simulation.
  acceptance_criteria:
    - Canvas renderer calls stateHistory.peek(frame) — does NOT run simulation itself
    - seekToFrame(n) renders any frame instantly (pre-computed state, no delay)
    - Forward AND backward seeking works (just peek different frame numbers)
    - Same frame always renders identical canvas (deterministic peek + deterministic draw)
    - Grid cells drawn as colored rects matching GitHub layout
    - Detaching cells show position interpolation between grid pos and spawn area
    - Formations visible with zigzag movement
    - Damaged invaders show reduced opacity per remaining HP
    - Ship visible, moves per ShipScript
    - Lasers visible traveling upward
    - Explosions visible on hit
    - Wave transitions visible (clear → next wave spawns from grid)
    - Playback controls: play, pause, step +1/-1/+10/-10, speed slider, restart
    - Frame scrubber (range slider) for direct frame access
    - HUD: frame number, total frames, wave number, invaders remaining, score
    - Fixture selector or JSON paste for different Grid inputs
    - window.simController API exposed for Playwright
    - Runs via vite dev server (imports src/ directly)
  out_of_scope: |
    Final sprites. CSS/SVG generation (Track 3). GitHub Action (Track 4).
    Automated Playwright tests (Track 3 — this track just provides the API).
  technical_notes: |
    Directory structure:
      dev/
        sim-viewer/
          index.html        — page with canvas + controls
          renderer.ts       — draws GameState to canvas
          playback.ts       — frame stepping, play/pause, speed
          main.ts           — loads sim, wires controls, exposes API

    Key principle: the renderer is stateless. It receives a GameState
    from peek() and draws it. No internal game state, no event processing,
    no simulation logic. Just: GameState → canvas pixels.

    window.simController API:
      seekToFrame(n)        — peek(n) then render
      play() / pause()      — toggle requestAnimationFrame loop
      step(delta)           — seek to currentFrame + delta
      setSpeed(mult)        — playback speed multiplier
      restart()             — seekToFrame(0)
      getFrame()            — current frame number
      getTotalFrames()      — stateHistory.totalFrames
      getState()            — current GameState (for Playwright assertions)

    Canvas drawing (simple shapes):
      Grid: rounded rects, green shades (0=empty, 1-4=intensity)
      Invaders: colored squares, opacity = currentHP / maxHP
      Ship: triangle at fixed y
      Lasers: thin bright lines
      Explosions: expanding circle with fade
      Cell detach: lerp position from gridPos to spawnPos based on
        detach progress (stored in GameState.gridCells[].detachProgress)

    Backward play: just decrement frame counter and peek.
    No special logic needed — StateHistory already has every frame.
