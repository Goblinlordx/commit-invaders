title: "Simulation Engine & Choreographer"
type: feature
status: pending
created: 2026-03-25
updated: 2026-03-25
spec:
  summary: |
    The simulation engine that orchestrates all subsystems (waves, formations,
    combat) into a complete game, producing a compact SimOutput with event log,
    per-entity inflection timelines, and on-demand state reconstruction via peek().
    The choreographer generates organic ShipScripts using the seeded PRNG.
  context: |
    The engine is the orchestrator. It runs the frame loop, calling wave
    manager, formation, and combat systems each frame, applying ShipScript
    commands. Instead of storing full GameState snapshots per frame (heavy),
    it records a compact event log (SimEvent[]) and builds per-entity
    inflection timelines DURING simulation.

    SimOutput is compact and queryable:
    - events: SimEvent[] — only state changes, not full snapshots
    - entityTimelines — inflection points per entity (direction changes,
      spawn, destroy, etc.), computed as the simulation runs
    - peek(frame) — reconstructs GameState on demand from events, with
      cached snapshots every ~100 frames for fast seeking
    - getInflections(entityId) — direct query used by CSS keyframe generator
      and sim renderer

    Inflection points are NOT post-processed — the engine inherently knows
    when a formation changes direction, when a laser spawns, when an invader
    is destroyed. It records these as EntityTimeline entries during the
    simulation loop. Track 3 (CSS generation) just queries these directly.

    The choreographer is the "solver" — it generates a ShipScript by
    pre-computing all invader positions (deterministic zigzag) and scheduling
    ship movements and fires to intercept them. It uses the seeded PRNG to
    inject organic variance. The game still completes but looks human.
  acceptance_criteria:
    - Engine takes (Grid, ShipScript, SimConfig) and produces SimOutput
    - SimOutput stores compact event log, not full snapshots per frame
    - SimOutput.peek(frame) reconstructs GameState from events with LRU cache + anchor snapshots
    - SimOutput.getInflections(entityId) returns InflectionPoint[] for that entity
    - SimOutput.getAllInflections() returns all entity timelines
    - Inflection points recorded DURING simulation (not post-processed)
    - Inflection points include: direction changes, spawn, transform, destroy, fire, wave clear
    - Engine orchestrates: wave spawn → formation move → ship command → laser advance → hit detect
    - All SimEvents recorded as compact deltas (only changes per frame)
    - Score tracked correctly across full game
    - Choreographer takes (Grid, PRNG, SimConfig) and produces ShipScript
    - PRNG injects variance: aim jitter, fire delay, miss chance, unnecessary moves, reaction delay
    - Missed invaders get re-targeted (game always completes)
    - End-to-end: Grid + seed → choreographer → engine → all invaders destroyed
    - Final score equals total active commits
    - Determinism: same (Grid, seed) → identical SimOutput across runs
  out_of_scope: |
    Rendering, CSS generation, GitHub Action.
  technical_notes: |
    Engine frame loop:
      1. Check wave spawn (spawn-on-clear + delay)
      2. Advance active formation (zigzag)
      3. Apply ShipScript command for this frame (move/fire/stop)
      4. Advance lasers
      5. Hit detection + damage + score
      6. Check wave clear → mark for next wave spawn
      7. Record SimEvents for any state changes this frame
      8. Record inflection points for any direction/state changes

    SimOutput (compact, queryable):
      events: SimEvent[]
        — Only records state changes (deltas), not full snapshots
        — A frame with no changes = zero events
        — Typical game: ~2000-5000 events total (vs ~1500 full snapshots)

      entityTimelines: Map<string, EntityTimeline>
        — Built during simulation, not post-processed
        — Entity types: 'formation-wN', 'ship', 'laser-N', 'invader-N'
        — Each timeline = sequence of InflectionPoint[]
        — Formation: start pos, each direction change, final pos
        — Ship: each move/stop command position
        — Invaders: spawn, transform, damage, destroy

      peek(frame): GameState
        — Reconstruct by replaying events from nearest cached snapshot
        — LRU cache of reconstructed GameStates for efficient forward/backward seeking
        — On cache miss: find nearest cached state (before or after target),
          replay events forward or backward to reach target frame
        — Periodic anchor snapshots every ~100 frames (computed during simulation)
          provide guaranteed worst-case replay distance
        — LRU eviction keeps memory bounded while caching hot frames
        — Used by sim renderer (Track 2) for frame-by-frame playback

      getInflections(entityId): InflectionPoint[]
        — Direct lookup in entityTimelines map
        — Used by CSS keyframe generator (Track 3) — no extraction needed
        — Each point has: { frame, position, eventType }

    Choreographer:
      1. Pre-compute all formation paths for each wave
      2. For each invader, find frame when it's targetable
      3. Schedule: reaction delay → move to position → fire
      4. PRNG variance on each step
      5. On miss: add invader back to target queue
      6. Continue until all invaders scheduled for destruction
