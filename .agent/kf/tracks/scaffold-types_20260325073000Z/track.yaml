spec:
  summary: |
    Bootstrap the project with tooling and define all core types for the
    simulation engine plus the seeded PRNG.
  context: |
    First track — sets up the project foundation that everything else builds
    on. Includes all shared type definitions so subsequent tracks can import
    them without circular dependencies. The seeded PRNG is included here
    because the choreographer (Track 1e) and engine both depend on it.
  acceptance_criteria:
    - pnpm project with Node 20 engine, TypeScript strict mode compiles clean
    - vitest configured and runs, eslint and prettier configured and pass
    - All core types defined and exported from src/types.ts
    - Seeded PRNG produces identical sequences from same seed
    - PRNG supports range(min, max), chance(probability), pick(array)
    - Directory structure matches spec (src/fetcher/, src/simulator/, etc.)
  out_of_scope: |
    Fetcher implementation, simulation logic, rendering.
  technical_notes: |
    Types to define:
      ContributionCell, ContributionLevel, Grid
      ShipCommand, ShipScript
      SimEvent, SimEventType
      GameState (with score) — reconstructable snapshot, not stored per frame
      SimOutput — compact event log + per-entity inflection timelines
      InflectionPoint { frame, position, type }
      EntityTimeline { entityId, inflections: InflectionPoint[] }
      CellState, FormationState, ShipState, LaserState, EffectState
      InvaderState (with hp, maxHp)
      WaveConfig, SimConfig
      PRNG interface

    SimOutput architecture (compact, queryable):
      events: SimEvent[]                    — delta log, only state changes
      entityTimelines: Map<string, EntityTimeline>  — inflection points per entity
      totalFrames: number
      peek(frame): GameState               — reconstruct from events (cached every ~100 frames)
      getInflections(entityId): InflectionPoint[]   — direct query for CSS keyframe generation
      getAllInflections(): Map<string, InflectionPoint[]>

    Key: inflection points are computed DURING simulation (engine knows
    when directions change), not as post-processing. This means Track 3
    (CSS generation) just queries the sim output rather than extracting.

    PRNG: simple mulberry32 or similar — seed from hash(username + timestamp).
    Must be pure, no external state. createPRNG(seed: string) → PRNG.
