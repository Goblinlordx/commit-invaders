spec:
  summary: |
    Query SimOutput inflection timelines, generate data-driven CSS keyframes,
    compose final animated SVG with sprites and palettes, and validate with
    Playwright visual regression comparing CSS SVG against simulation renderer.
  context: |
    Pipeline: SimOutput.getInflections() → CSS keyframes → SVG

    No inflection extraction step — inflection points are already computed
    by the simulation engine (Track 1e) and stored in SimOutput.entityTimelines.
    This track just maps them to CSS percentages and emits keyframes.

    Data-driven CSS: ~15 shared @keyframes templates parameterized by CSS
    custom properties, plus ~1 formation keyframe per wave. Total ~25 rules
    vs Platane/snk's ~370. Formations animate as <g> groups.

    Validation:
    1. Human already accepted simulation renderer output (Track 2)
    2. Playwright captures simulation renderer at key frames via seekToFrame()
    3. Playwright freezes CSS SVG at equivalent time via negative animation-delay
    4. Pixel diff comparison at inflection points — automated, runs in CI
  codebase_analysis: |
    Builds on SimOutput (engine track) and sim renderer (Track 2).
    Inflection points come pre-computed from the simulation — no extraction needed.
    CSS seek via negative animation-delay is a well-known technique.
  acceptance_criteria:
    - Reads inflection points from SimOutput.getInflections() (pre-computed by engine)
    - Maps inflection frame numbers to CSS animation percentages
    - Shared @keyframes for detach, transform, explode, laser (defined once)
    - Per-wave formation @keyframes from inflection points
    - Per-element CSS custom properties as style attributes
    - Formation movement via <g> group animation
    - Total keyframe rules under 30 for 10-wave game
    - 3+ invader sprite variants as SVG symbols
    - Ship, laser, explosion sprites
    - Light/dark palettes via prefers-color-scheme
    - Valid SVG compositor output
    - CSS SVG seekable via negative animation-delay technique
    - Playwright tests pass: sim renderer vs CSS SVG at inflection frames
    - Pixel diff under 5% threshold
    - Seamless loop (frame 0 = final frame)
    - GitHub-safe SVG (no JS, no external resources)
  out_of_scope: |
    GitHub Action (Track 4). GIF output.
  technical_notes: |
    Directory structure:
      src/
        animation/
          keyframe-emitter.ts — shared @keyframes CSS from SimOutput inflections
          data-emitter.ts     — per-element CSS variable style attributes
          timeline.ts         — frame-to-CSS-percentage mapping
        renderer/
          sprites.ts          — SVG symbol definitions
          palette.ts          — CSS custom property color schemes
          grid.ts             — contribution grid SVG layout
          compositor.ts       — assembles complete SVG
      dev/
        css-validator/
          index.html          — side-by-side sim canvas vs CSS SVG
          controller.ts       — synchronized frame/time seeking
      tests/
        visual/
          simulation-vs-css.spec.ts  — Playwright regression tests

    Inflection points:
      Pre-computed by the simulation engine (SimOutput.getInflections()).
      This track just maps frame numbers to CSS percentages via timeline.ts.
      No extraction logic needed — just query and transform.

    CSS seek for Playwright:
      .seek-mode svg * {
        animation-play-state: paused !important;
        animation-delay: calc(-1 * var(--seek-time)) !important;
      }
      Playwright sets --seek-time to freeze SVG at any point.

    Playwright test flow:
      1. Load css-validator page
      2. Get inflection frames from simulation
      3. For each frame: seekToFrame on sim, seekToTime on CSS
      4. Screenshot both, pixel-diff compare
      5. Assert threshold < 5%
