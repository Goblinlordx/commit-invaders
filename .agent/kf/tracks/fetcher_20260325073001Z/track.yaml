spec:
  summary: |
    GitHub GraphQL client that fetches contribution data and maps it to
    the Grid type. Includes response parsing, error handling, and test
    fixtures.
  context: |
    Fetches contribution calendar data from GitHub's GraphQL API and converts
    it into our internal Grid representation. This is the data source for
    the entire simulation pipeline. Must handle common API errors gracefully.
  acceptance_criteria:
    - GraphQL query fetches contributionsCollection.contributionCalendar
    - Response parser maps API data to Grid (cells with x, y, level, date, count)
    - Level mapping: NONE=0, FIRST_QUARTILE=1, ..., FOURTH_QUARTILE=4
    - Grid dimensions correct (height=7, width=number of weeks)
    - Error handling for invalid token, user not found, rate limit
    - Test fixtures with sample API responses for deterministic testing
    - No live API calls in tests
  out_of_scope: |
    Simulation logic, rendering, multi-year fetching.
  technical_notes: |
    Uses @octokit/graphql. Query matches Platane/snk (proven stable).
    Parser flattens weeks[].contributionDays[] into cells with x=weekIndex, y=weekday.
    Only cells with level > 0 will become invaders (level 0 = no contribution).
