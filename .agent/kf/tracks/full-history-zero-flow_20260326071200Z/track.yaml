id: full-history-zero-flow_20260326071200Z
title: "Full contribution history + zero-contribution graceful flow"
type: bug
status: pending
created: 2026-03-26
updated: 2026-03-26
spec:
  summary: |
    Use GitHub's contributionYears field to fetch ALL available history
    (not just hardcoded 10 years) with concurrent API requests. Add graceful
    zero-contribution flow: ship fadein, score "0 Commits", scoreboard, loop.
  context: |
    The scoreboard fetches contribution history via fetchContributionHistory()
    which is hardcoded to 10 years (action) or 5 years (default). GitHub's
    GraphQL API has no limit on how far back you can query — contributionYears
    returns the exact list of years with data (even pre-2008 imported git
    history). The current sequential year-by-year loop is also unnecessarily
    slow — all year fetches are independent and should run concurrently.

    Additionally, when a user has zero active contribution cells (all level 0),
    the simulation never fires a game_end event, causing the animation to idle
    forever with a static ship. This needs a graceful flow.
  codebase_analysis: |
    - fetchContributionHistory (src/fetcher/graphql.ts:112) loops sequentially
      with a years count parameter — should use contributionYears + Promise.all
    - Action hardcodes 10 (src/action/index.ts:35)
    - CLI doesn't fetch history at all (bin/commit-invaders.js:100)
    - GitHubGraphQLResponse type (src/fetcher/fixtures.ts:23) lacks createdAt
      and contributionYears fields
    - Wave manager (src/simulator/wave-manager.ts:30-40) filters to level > 0;
      zero active cells means totalWaves = 0
    - simulate.ts line 857: allCleared requires formations.length > 0, so
      game_end never fires with zero waves
    - svg-compositor.ts line 694: ending phases only render if gameEndEvent exists
    - svg-compositor.ts line 751: scoreboard already guards entries.length > 0
    - GitHub API confirmed: contributionYears returns exact years with data,
      no limit on historical queries, 1-year max span per query (already handled)
  acceptance_criteria:
    - Fetch 100% of contribution history using contributionYears field
    - All year fetches run concurrently via Promise.all (not sequential loop)
    - Zero active cells triggers game_end immediately after ship fadein
    - Score screen shows "0 Commits" for zero-contribution current year
    - Scoreboard shows historical high scores or empty board if none
    - CLI fetches full history when scoreboard is enabled
    - No hardcoded year limits anywhere
  out_of_scope: |
    Changing scoreboard algorithm or display layout. Rate limiting for
    accounts with 20+ contribution years (unlikely, can address later).
  technical_notes: |
    Phase 1 approach: Add contributionYears to the existing CONTRIBUTION_QUERY
    (no extra API call). Then refactor fetchContributionHistory to accept a
    years[] array and Promise.all the fetches. Phase 2: In simulate.ts, detect
    totalWaves === 0 after wave manager init and immediately emit game_end
    with score 0. Ship still fades in/out for visual continuity.
