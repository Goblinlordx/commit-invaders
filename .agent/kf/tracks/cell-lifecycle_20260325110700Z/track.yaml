id: cell-lifecycle_20260325110700Z
title: Cell Lifecycle — Pluck, Travel, Hatch with Wave Phase Transitions
type: feature
status: pending
created: 2026-03-25
updated: '2026-03-25'
spec:
  summary: 'Add cell pluck/travel/hatch lifecycle to the simulation with

    configurable timing, wave phase tracking, inflection points, and

    renderer support for the full visual sequence per wave.

    '
  context: 'Current state: all cells are always in_grid with detachProgress=0.

    The types already define CellState.status and detachProgress but

    the simulation never populates them. Event types cell_detach and

    cell_transform exist but are never emitted.


    The full visual sequence per wave:

    1. BRIGHTEN — overlay fades out, grid becomes visible ("look at the grid")

    2. PLUCK — selected cells change color (green → amber), still at grid position

    3. DARKEN — overlay fades back in, combat mode returns

    4. TRAVEL — plucked cells animate from grid position to formation area

    5. HATCH — cells at destination transform (amber → red invader color)

    6. ACTIVE — formation starts oscillating, ship fires

    7. CLEARING — wave cleared, brief pause before next cycle


    For the hitbox sim-viewer, these are just color changes and position

    interpolation. The CSS/SVG renderer will later add smooth transitions.

    '
  codebase_analysis: "Types (src/types.ts):\n  CellState.status: 'in_grid' | 'detaching' | 'transformed' | 'destroyed'\n \
    \ CellState.detachProgress: number (0-1)\n  SimEventType: includes 'cell_detach', 'cell_transform' (unused)\n  WaveConfig:\
    \ { weeksPerWave, spawnDelay }\n  GameState.gridCells: CellState[]\n\nSimulation (src/simulator/simulate.ts):\n  buildGameState\
    \ always returns all cells as in_grid/0\n  Wave spawn is instant — no lifecycle phases\n  The solver pauses during solveCooldown\
    \ but not for wave transitions\n\nRenderer (dev/sim-viewer/renderer.ts):\n  Draws grid cells at fixed positions, always\
    \ grid colors\n  Overlay is binary (on when formations.length > 0)\n\nWave manager (src/simulator/wave-manager.ts):\n\
    \  trySpawnNext checks lastClearedWave and spawnDelay\n  No concept of pre-spawn phases\n"
  acceptance_criteria:
  - CellState.status expanded with 'plucked' and 'hatching' states
  - WaveConfig gains timing fields (brightenDuration, pluckDuration, travelDuration, hatchDuration, darkenDuration)
  - GameState gains wavePhase field tracking current transition state
  - Simulation runs full lifecycle before wave becomes active
  - Cell positions interpolate during travel phase (detachProgress 0→1)
  - Inflection points emitted for each cell at pluck, travel_start, travel_end, hatch_start, hatch_complete
  - Wave phase inflection points emitted (brighten, darken, wave_active)
  - Renderer shows plucked cells as amber, hatching cells transitioning, traveling cells interpolated
  - Renderer overlay opacity varies by wave phase (transparent during brighten/pluck, opaque during travel/active)
  - All timings configurable via SimConfig tuning panel in sim-viewer
  - Existing tests updated — simulation still completes all invaders
  - Perf benchmark still passes (full year under 500ms)
  out_of_scope: 'Smooth CSS transitions (visual-polish track).

    Particle effects during hatch. Wave label text overlay.

    Score counter animation.

    '
  technical_notes: "Type changes:\n\n  CellState.status: 'in_grid' | 'plucked' | 'traveling' | 'hatching' | 'transformed'\
    \ | 'destroyed'\n\n  WaveConfig additions:\n    brightenDuration: number  // frames for overlay fade-out\n    pluckDuration:\
    \ number     // frames cells show as plucked at grid pos\n    darkenDuration: number    // frames for overlay fade-in\n\
    \    travelDuration: number    // frames for cell position interpolation\n    hatchDuration: number     // frames for\
    \ color transition at destination\n\n  GameState addition:\n    wavePhase: 'idle' | 'brightening' | 'plucking' | 'darkening'\
    \ | 'traveling' | 'hatching' | 'active' | 'clearing'\n\nSimulation flow change:\n\n  When wave manager says \"next wave\
    \ ready\":\n  1. Enter brightening phase (brightenDuration frames)\n     - Emit wave_phase_change event\n  2. Enter plucking\
    \ phase (pluckDuration frames)\n     - Mark selected cells as 'plucked'\n     - Emit cell_pluck events + inflection points\
    \ per cell\n  3. Enter darkening phase (darkenDuration frames)\n  4. Enter traveling phase (travelDuration frames)\n \
    \    - Each frame: detachProgress += 1/travelDuration\n     - Cell position = lerp(gridPos, formationPos, detachProgress)\n\
    \     - Emit cell_travel_start at beginning, track in inflections\n  5. Enter hatching phase (hatchDuration frames)\n\
    \     - Mark cells as 'hatching'\n     - Emit cell_hatch events + inflection points\n  6. Convert cells to invaders, enter\
    \ active phase\n     - Mark cells as 'transformed'\n     - Formation starts, solver engages\n\n  The solver's solveCooldown\
    \ should be extended to cover the full\n  lifecycle duration so the ship doesn't fire during transitions.\n  Ship can\
    \ still move freely during phases 1-5 (free movement time).\n\nRenderer changes:\n\n  Grid cell colors by status:\n  \
    \  in_grid:     normal green shades (level-based)\n    plucked:     #d29922 (amber/gold)\n    traveling:   #d29922 at\
    \ interpolated position\n    hatching:    lerp(#d29922, #ff4444, hatchProgress)\n    transformed: not drawn (now an invader)\n\
    \n  Overlay opacity by wavePhase:\n    idle:        0.0 (fully transparent)\n    brightening: lerp(0.6, 0.0, phaseProgress)\n\
    \    plucking:    0.0 (transparent — see the plucked cells)\n    darkening:   lerp(0.0, 0.6, phaseProgress)\n    traveling:\
    \   0.6\n    hatching:    0.6\n    active:      0.6\n    clearing:    0.6\n\nCell selection for waves:\n\n  The wave manager\
    \ already groups cells by column into waves.\n  Each wave's cells map to specific grid positions. When a wave\n  enters\
    \ pluck phase, those exact cells change status. The mapping\n  is: wave.cells[i].cell → find matching gridCell by (x,\
    \ y).\n"
