spec:
  summary: |
    Package the validated pipeline as a GitHub Action: action.yml, entrypoint,
    bundling, output branch management, reduced-motion fallback, and README.
  context: |
    Everything works locally and is validated by both human review and
    automated Playwright tests. This track is purely packaging and docs.
  codebase_analysis: |
    Follows Platane/snk node20 SVG-only pattern.
  acceptance_criteria:
    - action.yml with inputs (github_user_name, github_token, output_branch, animation_duration, waves_per_week)
    - node20 runtime
    - Full pipeline orchestration in entrypoint
    - Animated SVG with embedded light/dark palette
    - Reduced-motion static SVG fallback
    - Output branch creation, SVG commit, push
    - tsup bundle to dist/index.js
    - Example workflow YAML
    - README with preview, setup, config table, picture tag
    - End-to-end test in workflow
  out_of_scope: |
    Marketplace publishing. GIF output. Web demo.
  technical_notes: |
    Execution flow (simplified by unified solver):
    fetch → simulate(grid, seed, config) → CSS generation from inflections → SVG → write → push
    No separate choreographer or inflection extraction step needed.
