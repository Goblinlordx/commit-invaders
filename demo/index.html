<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commit Invaders — Demo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👾</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <h1 class="title">COMMIT<span class="title-accent">INVADERS</span></h1>
      <p class="subtitle">Transform your GitHub contributions into a Space Invaders battle</p>
      <nav class="nav-links">
        <a href="https://github.com/Goblinlordx/commit-invaders" target="_blank" class="gh-link">
          <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align: text-bottom; margin-right: 4px;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
          GitHub Repo
        </a>
        <a href="https://github.com/Goblinlordx/commit-invaders#quick-setup" target="_blank">Setup Guide</a>
        <a href="https://www.npmjs.com/package/commit-invaders" target="_blank">npm</a>
      </nav>
    </header>

    <!-- Controls -->
    <section class="controls">
      <div class="input-group">
        <label for="username">GitHub Username</label>
        <div class="input-row">
          <div class="avatar-wrapper">
            <img id="gh-avatar" class="avatar" alt="" />
          </div>
          <input type="search" id="gh-contributor" name="gh-contributor" autocomplete="off" data-1p-ignore data-lpignore="true" data-bwignore placeholder="Goblinlordx" value="Goblinlordx" />
          <button id="generate-btn" class="btn btn-primary">Generate</button>
        </div>
      </div>
      <div class="theme-row">
        <label>Theme</label>
        <div class="theme-buttons">
          <button class="btn btn-theme active" data-theme="dark">Dark</button>
          <button class="btn btn-theme" data-theme="light">Light</button>
          <button class="btn btn-theme" data-theme="classic">Classic</button>
        </div>
      </div>
    </section>

    <!-- Profile Display (shown after generation) -->
    <section class="profile-display" id="profile-display" style="display:none">
      <img id="profile-avatar" class="profile-avatar" alt="" />
      <a id="profile-username" class="profile-username" target="_blank" rel="noopener"></a>
    </section>

    <!-- Preview -->
    <section class="preview-section">
      <div class="preview-frame" id="preview-frame">
        <div class="preview-container" id="preview-container">
          <p class="preview-placeholder">Enter a GitHub username and click Generate</p>
        </div>
      </div>
      <div class="scrubber-row">
        <input type="range" id="scrubber" min="0" max="1000" value="0" step="1" class="scrubber" />
      </div>
      <div class="playback-row">
        <button id="play-pause" class="btn btn-small">⏸</button>
        <span id="time-display" class="time-display">0:00 / 0:00</span>
        <span class="scrubber-hint">Preview — download SVG for smooth playback</span>
      </div>
    </section>

    <!-- Stats -->
    <div class="stats-row" id="stats-row" style="display:none">
      <span id="stat-cells"></span>
      <span id="stat-commits"></span>
      <span id="stat-waves"></span>
      <span id="stat-duration"></span>
      <span id="stat-size"></span>
    </div>

    <!-- Actions -->
    <div class="actions-row" id="actions-row" style="display:none">
      <button id="download-svg" class="btn btn-secondary">Download SVG</button>
      <button id="toggle-debug" class="btn btn-secondary">Debug Mode</button>
    </div>

    <!-- Debug Panel -->
    <section class="debug-panel" id="debug-panel" style="display:none">
      <h3>Simulation Parameters</h3>
      <div class="debug-grid" id="debug-grid"></div>
      <button id="reset-params" class="btn btn-small">Reset Defaults</button>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>Made with CSS keyframes, no JavaScript in the SVG.</p>
      <p><a href="https://github.com/Goblinlordx/commit-invaders">View source</a></p>
    </footer>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
