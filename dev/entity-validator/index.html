<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commit Invaders — Entity Validator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: monospace; padding: 12px; }
    h1 { font-size: 14px; margin-bottom: 8px; color: #58a6ff; }
    .row { display: flex; gap: 8px; margin-bottom: 12px; align-items: flex-start; }
    .panel { background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 6px; }
    .panel h2 { font-size: 10px; color: #8b949e; margin-bottom: 4px; }
    .panel canvas, .panel svg { display: block; border: 1px solid #21262d; }
    .controls { padding: 8px; background: #161b22; border: 1px solid #30363d; margin-bottom: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .controls label { font-size: 11px; color: #8b949e; }
    .controls select, .controls input { background: #21262d; color: #e6edf3; border: 1px solid #30363d; padding: 3px 6px; font-family: monospace; font-size: 11px; }
    .controls button { background: #21262d; color: #e6edf3; border: 1px solid #30363d; padding: 3px 10px; cursor: pointer; font-family: monospace; font-size: 11px; }
    .controls button:hover { background: #30363d; }
    #result { font-size: 11px; padding: 4px 8px; }
    .pass { color: #39d353; }
    .fail { color: #ff4444; }
  </style>
</head>
<body>
  <h1>Entity Validator — Canvas vs SVG Side-by-Side</h1>
  <div class="controls">
    <label>Entity: <select id="entity-select">
      <option value="grid">Grid Cells</option>
      <option value="invader">Invaders</option>
      <option value="ship">Ship</option>
      <option value="laser">Lasers</option>
      <option value="lifecycle">Lifecycle Cells</option>
      <option value="overlay">Overlay</option>
    </select></label>
    <label>Frame: <input type="range" id="frame-slider" min="0" max="0" value="0" /></label>
    <span id="frame-display">0</span>
    <button id="btn-diff">Pixel Diff</button>
    <span id="result"></span>
  </div>
  <div class="row">
    <div class="panel">
      <h2>Canvas (ground truth)</h2>
      <canvas id="canvas-view"></canvas>
    </div>
    <div class="panel">
      <h2>SVG (CSS animated)</h2>
      <div id="svg-container"></div>
    </div>
    <div class="panel">
      <h2>Diff</h2>
      <canvas id="diff-canvas"></canvas>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
