<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commit Invaders — CSS Validator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: monospace; padding: 12px; }
    h1 { font-size: 14px; margin-bottom: 8px; color: #58a6ff; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    .panel { background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 6px; }
    .panel h2 { font-size: 10px; color: #8b949e; margin-bottom: 4px; }
    .controls { padding: 8px; background: #161b22; border: 1px solid #30363d; margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
    .controls input, .controls button { background: #21262d; color: #e6edf3; border: 1px solid #30363d; padding: 3px 8px; font-family: monospace; font-size: 11px; }
    .controls button:hover { background: #30363d; cursor: pointer; }
    .controls label { font-size: 11px; color: #8b949e; }
    #result { font-size: 11px; padding: 4px 8px; }
    .pass { color: #39d353; } .fail { color: #ff4444; }
    #svg-output { font-size: 10px; color: #8b949e; max-height: 100px; overflow: auto; background: #21262d; padding: 4px; margin-top: 8px; border: 1px solid #30363d; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h1>CSS Validator — Full Canvas vs Animated SVG</h1>
  <div class="controls">
    <label>Frame: <input type="range" id="frame-slider" min="0" max="0" value="0" /></label>
    <span id="frame-display">0</span>
    <button id="btn-diff">Pixel Diff</button>
    <button id="btn-export">Export SVG</button>
    <span id="result"></span>
  </div>
  <div class="row">
    <div class="panel">
      <h2>Canvas (full render)</h2>
      <canvas id="canvas-view"></canvas>
    </div>
    <div class="panel">
      <h2>SVG (CSS animated, paused)</h2>
      <div id="svg-container"></div>
    </div>
  </div>
  <div id="svg-output" style="display:none"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
