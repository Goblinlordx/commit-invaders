name: Generate Example SVG

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Generate SVG
        run: GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} npx tsx scripts/generate.ts Goblinlordx commit-invaders.svg

      - name: Deploy to output branch
        run: |
          # Save SVG before switching branches
          cp commit-invaders.svg /tmp/commit-invaders.svg

          git config user.name "commit-invaders[bot]"
          git config user.email "commit-invaders[bot]@users.noreply.github.com"

          # Clean build artifacts so branch checkout succeeds
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true

          git fetch origin output 2>/dev/null || true
          if git rev-parse --verify origin/output >/dev/null 2>&1; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . 2>/dev/null || true
          fi
          
          cp /tmp/commit-invaders.svg commit-invaders.svg
          git add commit-invaders.svg
          git diff --cached --quiet || git commit -m "chore: update example SVG for Goblinlordx"
          git push origin output
